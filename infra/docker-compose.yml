version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdftools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdftools123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-pdftools123}@postgres:5432/pdftools
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HMAC_SECRET: ${HMAC_SECRET:-change-me-in-production}
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
    volumes:
      - filedata:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-pdftools123}@postgres:5432/pdftools
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      WORKER_CONCURRENCY: "4"
    volumes:
      - filedata:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  janitor:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    command: ["node", "--import", "tsx/esm", "apps/janitor/src/index.ts"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-pdftools123}@postgres:5432/pdftools
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      JANITOR_INTERVAL_MS: "300000"
    volumes:
      - filedata:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  filedata:
